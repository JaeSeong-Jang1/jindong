<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천 | 실제 통계 기반</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 60px;
      color: #fff;
    }

    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    .update-badge {
      display: inline-block;
      background: rgba(99,102,241,0.25);
      border: 1px solid rgba(99,102,241,0.5);
      color: #a5b4fc;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 28px 24px;
      width: 100%;
      max-width: 600px;
      backdrop-filter: blur(16px);
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .mode-tab {
      padding: 12px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      line-height: 1.4;
    }
    .mode-tab .tab-icon { font-size: 1rem; display: block; margin-bottom: 3px; }
    .mode-tab .tab-name { font-weight: 600; font-size: 0.88rem; color: #cbd5e1; display: block; }
    .mode-tab .tab-desc { font-size: 0.73rem; color: #64748b; }
    .mode-tab:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
    .mode-tab.active {
      background: rgba(99,102,241,0.2);
      border-color: #6366f1;
    }
    .mode-tab.active .tab-name { color: #a5b4fc; }
    .mode-tab.active .tab-desc { color: #818cf8; }

    .count-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .count-row label { font-size: 0.82rem; color: #94a3b8; white-space: nowrap; }
    .count-row input[type=range] { flex: 1; accent-color: #6366f1; }
    .count-badge {
      background: rgba(99,102,241,0.25);
      border: 1px solid #6366f1;
      color: #a5b4fc;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      min-width: 56px;
      text-align: center;
    }

    .gen-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .gen-btn:hover { opacity: 0.9; }
    .gen-btn:active { transform: scale(0.98); }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .mode-info-badge {
      font-size: 0.75rem;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .copy-all-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-all-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .set-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      animation: fadeUp 0.3s ease both;
    }
    .set-row:last-child { border-bottom: none; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .set-num { font-size: 0.72rem; color: #475569; min-width: 22px; text-align: center; }
    .balls { display: flex; gap: 7px; flex: 1; flex-wrap: wrap; }
    .ball {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem;
      flex-shrink: 0;
      position: relative;
    }
    .b1 { background: radial-gradient(circle at 38% 38%, #fde68a, #d97706); color: #3d1f00; }
    .b2 { background: radial-gradient(circle at 38% 38%, #93c5fd, #2563eb); color: #fff; }
    .b3 { background: radial-gradient(circle at 38% 38%, #86efac, #16a34a); color: #052e16; }
    .b4 { background: radial-gradient(circle at 38% 38%, #f9a8d4, #db2777); color: #fff; }
    .b5 { background: radial-gradient(circle at 38% 38%, #fca5a5, #dc2626); color: #fff; }
    .b6 { background: radial-gradient(circle at 38% 38%, #c4b5fd, #7c3aed); color: #fff; }

    .ball .dot {
      position: absolute; top: 2px; right: 2px;
      width: 7px; height: 7px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.25);
    }
    .dot.hot  { background: #ef4444; }
    .dot.cold { background: #60a5fa; }

    .copy-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      color: #64748b;
      font-size: 0.7rem;
      padding: 5px 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .stat-title { font-size: 0.82rem; font-weight: 600; color: #94a3b8; margin-bottom: 14px; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 4px;
    }
    .stat-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-num-lbl { font-size: 0.58rem; color: #475569; }
    .stat-bar-wrap { width: 100%; height: 40px; display: flex; align-items: flex-end; justify-content: center; }
    .stat-bar { width: 10px; border-radius: 3px 3px 0 0; min-height: 4px; }
    .stat-count-lbl { font-size: 0.5rem; color: #334155; }

    .legend { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #64748b; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .top-nums {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .top-label { font-size: 0.72rem; color: #64748b; margin-bottom: 8px; }
    .top-balls { display: flex; gap: 6px; flex-wrap: wrap; }
    .top-ball {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .top-ball.hot  { background: rgba(239,68,68,0.2);  border: 1px solid rgba(239,68,68,0.4);  color: #fca5a5; }
    .top-ball.cold { background: rgba(96,165,250,0.2); border: 1px solid rgba(96,165,250,0.4); color: #93c5fd; }

    .footer { font-size: 0.72rem; color: #1e293b; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

<h1>🎱 로또 번호 추천</h1>
<p class="subtitle">1회 ~ 1216회 실제 당첨 통계 기반</p>
<div class="update-badge">📊 2026년 3월 21일 (1216회) 기준 데이터</div>

<!-- 설정 -->
<div class="card">
  <p class="section-label">추천 방식 선택</p>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="hot">
      <span class="tab-icon">🔥</span>
      <span class="tab-name">핫넘버 중심</span>
      <span class="tab-desc">가장 많이 나온 번호 위주</span>
    </button>
    <button class="mode-tab" data-mode="cold">
      <span class="tab-icon">❄️</span>
      <span class="tab-name">콜드넘버 중심</span>
      <span class="tab-desc">적게 나온 번호 위주</span>
    </button>
    <button class="mode-tab" data-mode="mixed">
      <span class="tab-icon">⚖️</span>
      <span class="tab-name">핫+콜드 혼합</span>
      <span class="tab-desc">인기+비인기 균형 조합</span>
    </button>
    <button class="mode-tab" data-mode="weighted">
      <span class="tab-icon">📈</span>
      <span class="tab-name">확률 가중 추출</span>
      <span class="tab-desc">출현 빈도에 비례한 추출</span>
    </button>
  </div>

  <p class="section-label">게임 수</p>
  <div class="count-row">
    <label>게임 수</label>
    <input type="range" id="count-slider" min="1" max="10" value="5" step="1" />
    <div class="count-badge" id="count-out">5게임</div>
  </div>

  <button class="gen-btn" id="gen-btn">✨ 번호 생성하기</button>
</div>

<!-- 결과 -->
<div class="card" id="result-card" style="display:none;">
  <div class="result-header">
    <span class="mode-info-badge" id="mode-info-badge"></span>
    <button class="copy-all-btn" id="copy-all-btn">전체 복사</button>
  </div>
  <div id="sets-container"></div>
</div>

<!-- 통계 차트 -->
<div class="card">
  <p class="stat-title">📊 번호별 역대 출현 횟수 (1~1216회 전체)</p>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>상위 10개 (핫)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>하위 10개 (콜드)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>중간</div>
  </div>
  <div class="top-nums">
    <p class="top-label">🔥 핫넘버 Top 10 (많이 나온 순)</p>
    <div class="top-balls" id="hot-balls"></div>
    <p class="top-label" style="margin-top:10px">❄️ 콜드넘버 Bottom 10 (적게 나온 순)</p>
    <div class="top-balls" id="cold-balls"></div>
  </div>
</div>

<p class="footer">* 통계는 참고용이며, 당첨을 보장하지 않습니다.</p>

<script>
const STATS = {
   1:199,  2:188,  3:201,  4:194,  5:178,  6:197,  7:200,  8:179,  9:158,
  10:188, 11:190, 12:204, 13:202, 14:193, 15:190, 16:194, 17:202, 18:191,
  19:189, 20:196, 21:190, 22:161, 23:168, 24:197, 25:172, 26:195, 27:211,
  28:176, 29:169, 30:188, 31:195, 32:175, 33:204, 34:204, 35:191, 36:186,
  37:197, 38:199, 39:190, 40:194, 41:164, 42:178, 43:197, 44:185, 45:193
};

const allNums = Array.from({length:45},(_,i)=>i+1);
const sorted  = [...allNums].sort((a,b)=>STATS[b]-STATS[a]);
const HOT10   = sorted.slice(0,10);
const COLD10  = sorted.slice(35,45);
const MID     = sorted.slice(10,35);

const modeLabels = {
  hot:'🔥 핫넘버 중심', cold:'❄️ 콜드넘버 중심',
  mixed:'⚖️ 핫+콜드 혼합', weighted:'📈 확률 가중 추출'
};

let currentMode='hot', gameCount=5, generatedSets=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickSix(mode){
  let picked;
  if(mode==='hot'){
    const h=shuffle(HOT10).slice(0,4);
    const r=shuffle(allNums.filter(n=>!HOT10.includes(n))).slice(0,2);
    picked=[...h,...r];
  } else if(mode==='cold'){
    const c=shuffle(COLD10).slice(0,4);
    const r=shuffle(allNums.filter(n=>!COLD10.includes(n))).slice(0,2);
    picked=[...c,...r];
  } else if(mode==='mixed'){
    const h=shuffle(HOT10).slice(0,2);
    const c=shuffle(COLD10).slice(0,2);
    const m=shuffle(MID).slice(0,2);
    picked=[...h,...c,...m];
  } else {
    const pool=[];
    allNums.forEach(n=>{
      const w=Math.round(STATS[n]/10);
      for(let i=0;i<w;i++) pool.push(n);
    });
    const seen=new Set(); picked=[];
    for(const n of shuffle(pool)){
      if(!seen.has(n)){seen.add(n);picked.push(n);}
      if(picked.length===6) break;
    }
  }
  return picked.sort((a,b)=>a-b);
}

function ballClass(n){
  if(n<=10) return 'b1';
  if(n<=20) return 'b2';
  if(n<=30) return 'b3';
  if(n<=35) return 'b4';
  if(n<=40) return 'b5';
  return 'b6';
}

function renderChart(){
  const grid=document.getElementById('stat-grid');
  grid.innerHTML='';
  const vals=allNums.map(n=>STATS[n]);
  const max=Math.max(...vals), min=Math.min(...vals);
  allNums.forEach(n=>{
    const pct=((STATS[n]-min)/(max-min)*36+4).toFixed(1);
    let color='#6366f1';
    if(HOT10.includes(n))  color='#ef4444';
    if(COLD10.includes(n)) color='#60a5fa';
    const cell=document.createElement('div');
    cell.className='stat-cell';
    cell.innerHTML=`
      <div class="stat-num-lbl">${n}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="height:${pct}px;background:${color};opacity:0.8"></div></div>
      <div class="stat-count-lbl">${STATS[n]}</div>
    `;
    grid.appendChild(cell);
  });

  const hotEl=document.getElementById('hot-balls');
  const coldEl=document.getElementById('cold-balls');
  HOT10.forEach(n=>{
    hotEl.innerHTML+=`<span class="top-ball hot">${n} <small style="opacity:0.7">(${STATS[n]})</small></span>`;
  });
  COLD10.slice().sort((a,b)=>STATS[a]-STATS[b]).forEach(n=>{
    coldEl.innerHTML+=`<span class="top-ball cold">${n} <small style="opacity:0.7">(${STATS[n]})</small></span>`;
  });
}

function renderSets(){
  const container=document.getElementById('sets-container');
  const resultCard=document.getElementById('result-card');
  document.getElementById('mode-info-badge').textContent=modeLabels[currentMode];
  resultCard.style.display='block';
  container.innerHTML='';
  generatedSets.forEach((nums,idx)=>{
    const row=document.createElement('div');
    row.className='set-row';
    row.style.animationDelay=(idx*0.06)+'s';
    const lbl=document.createElement('div');
    lbl.className='set-num';
    lbl.textContent=String(idx+1).padStart(2,'0');
    const balls=document.createElement('div');
    balls.className='balls';
    nums.forEach(n=>{
      const b=document.createElement('div');
      b.className='ball '+ballClass(n);
      b.textContent=n;
      if(HOT10.includes(n)){
        const d=document.createElement('div'); d.className='dot hot'; b.appendChild(d);
      } else if(COLD10.includes(n)){
        const d=document.createElement('div'); d.className='dot cold'; b.appendChild(d);
      }
      balls.appendChild(b);
    });
    const cp=document.createElement('button');
    cp.className='copy-btn'; cp.textContent='복사';
    cp.onclick=()=>{
      navigator.clipboard.writeText(nums.join(', ')).then(()=>{
        cp.textContent='완료!';
        setTimeout(()=>cp.textContent='복사',1400);
      });
    };
    row.appendChild(lbl); row.appendChild(balls); row.appendChild(cp);
    container.appendChild(row);
  });
}

document.querySelectorAll('.mode-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode=btn.dataset.mode;
  });
});

const slider=document.getElementById('count-slider');
slider.addEventListener('input',()=>{
  gameCount=parseInt(slider.value);
  document.getElementById('count-out').textContent=gameCount+'게임';
});

document.getElementById('gen-btn').addEventListener('click',()=>{
  generatedSets=[];
  for(let i=0;i<gameCount;i++) generatedSets.push(pickSix(currentMode));
  renderSets();
});

document.getElementById('copy-all-btn').addEventListener('click',()=>{
  const text=generatedSets.map((nums,i)=>`${i+1}게임: ${nums.join(', ')}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById('copy-all-btn');
    b.textContent='완료!';
    setTimeout(()=>b.textContent='전체 복사',1400);
  });
});

renderChart();
</script>
</body>
</html>
